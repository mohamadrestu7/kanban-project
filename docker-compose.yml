services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '8000:8000'
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PORT=8000
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend:/app/backend
      - ./frontend/out:/app/backend/public/out:ro
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
